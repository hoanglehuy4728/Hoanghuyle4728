<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HoangHuy Flashcard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #000; --surface: #111; --card: #1a1a1a;
    --border: #2a2a2a; --accent: #4f8ef7; --accent2: #7c5af0;
    --text: #f0f0f0; --muted: #666; --success: #34d399; --radius: 24px;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
  body { display: flex; flex-direction: column; }

  /* Header */
  header {
    flex-shrink: 0; padding: 14px 20px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 {
    font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(120deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  #menu-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 5px; padding: 6px; -webkit-tap-highlight-color: transparent; }
  #menu-btn span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; }

  /* Drawer */
  #drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; opacity: 0; pointer-events: none; transition: opacity .3s; }
  #drawer-overlay.open { opacity: 1; pointer-events: all; }
  #drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 75vw; max-width: 300px; background: var(--surface); border-right: 1px solid var(--border); z-index: 101; transform: translateX(-100%); transition: transform .3s cubic-bezier(.4,0,.2,1); overflow-y: auto; padding: 24px 0; }
  #drawer.open { transform: translateX(0); }
  #drawer h2 { font-size: 0.7rem; font-weight: 600; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; padding: 0 20px 14px; }
  .drawer-tab { display: block; width: 100%; padding: 14px 20px; font-size: 0.92rem; font-weight: 500; color: var(--muted); border: none; background: none; cursor: pointer; text-align: left; font-family: 'Inter', sans-serif; border-left: 3px solid transparent; transition: color .2s, background .2s, border-color .2s; -webkit-tap-highlight-color: transparent; }
  .drawer-tab.active { color: var(--accent); border-left-color: var(--accent); background: rgba(79,142,247,.08); }

  /* Section bar */
  #section-bar { flex-shrink: 0; padding: 8px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
  #section-title { font-size: 0.78rem; color: var(--muted); }

  /* App */
  #app { flex: 1; display: flex; flex-direction: column; min-height: 0; }

  /* Middle */
  #middle { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 14px 16px 10px; gap: 12px; min-height: 0; }

  #counter { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.06em; }

  #progress-wrap { width: 100%; max-width: 500px; height: 2px; background: var(--border); border-radius: 99px; overflow: hidden; }
  #progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .4s ease; }

  /* Card viewport */
  #card-viewport {
    width: 100%; max-width: 500px;
    flex: 1; min-height: 0;
    position: relative; overflow: hidden;
    border-radius: var(--radius);
  }

  /* Track: 3 slots — prev | current | next */
  #card-track {
    position: absolute; top: 0; bottom: 0;
    left: -100%; width: 300%;
    display: flex;
    will-change: transform;
  }
  #card-track.animating {
    transition: transform .38s cubic-bezier(.4,0,.2,1);
  }

  .card-slot { flex-shrink: 0; width: 33.333%; height: 100%; padding: 0 6px; }

  .card {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d;
    transition: transform .45s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; padding: 28px 24px;
  }
  .card-face::before {
    content: ''; position: absolute; inset: 0; border-radius: var(--radius);
    background: radial-gradient(ellipse at 30% 20%, rgba(79,142,247,.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .card-front .word {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(2rem, 9vw, 3.2rem);
    font-weight: 700; color: var(--text);
    letter-spacing: -0.02em; text-align: center; line-height: 1.1;
  }
  .card-front .hint { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .card-back { transform: rotateY(180deg); background: #0d1520; }
  .card-back .translation { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1.3rem, 5vw, 1.9rem); font-weight: 600; color: var(--success); text-align: center; }
  .card-back .word-en { font-size: 0.88rem; color: var(--muted); text-align: center; }

  /* Sound btn */
  #sound-btn {
    position: absolute; top: 14px; right: 14px;
    width: 46px; height: 46px; border-radius: 50%;
    border: 1px solid var(--border); background: rgba(79,142,247,.08);
    color: var(--accent); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.35rem; z-index: 10;
    -webkit-tap-highlight-color: transparent;
    transition: background .2s;
  }
  #sound-btn:active { background: rgba(79,142,247,.25); }

  #audio-status { font-size: 0.65rem; color: var(--muted); height: 12px; }

  /* Bottom nav */
  #nav-bar {
    flex-shrink: 0;
    padding: 12px 20px max(16px, env(safe-area-inset-bottom));
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; gap: 14px;
  }
  .nav-btn {
    width: 60px; height: 60px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-size: 1.7rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; transition: background .15s;
  }
  .nav-btn:active { background: var(--border); }
  .nav-btn:disabled { opacity: .25; }
  #flip-btn {
    flex: 1; max-width: 180px; height: 60px; border-radius: 99px;
    border: 1px solid var(--accent); background: rgba(79,142,247,.1);
    color: var(--accent); font-family: 'Inter', sans-serif;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: background .15s;
  }
  #flip-btn:active { background: rgba(79,142,247,.25); }
</style>
</head>
<body>

<header>
  <button id="menu-btn" onclick="toggleDrawer()">
    <span></span><span></span><span></span>
  </button>
  <h1>HoangHuy</h1>
  <div style="width:34px"></div>
</header>

<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <h2>Chủ đề</h2>
  <div id="drawer-menu"></div>
</div>

<div id="app">
  <div id="section-bar"><div id="section-title"></div></div>

  <div id="middle">
    <div id="counter"></div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>

    <div id="card-viewport">
      <div id="card-track">
        <!-- slot prev -->
        <div class="card-slot" id="slot-prev">
          <div class="card" id="card-prev">
            <div class="card-face card-front"><div class="word" id="prev-word-en"></div></div>
            <div class="card-face card-back">
              <div class="word-en" id="prev-word-en-back"></div>
              <div class="translation" id="prev-word-vi"></div>
            </div>
          </div>
        </div>
        <!-- slot current -->
        <div class="card-slot" id="slot-cur">
          <div class="card" id="card-cur">
            <div class="card-face card-front">
              <button id="sound-btn" onclick="event.stopPropagation(); playAudio()">🔊</button>
              <div class="word" id="cur-word-en"></div>
              <div class="hint">nhấn để xem nghĩa</div>
            </div>
            <div class="card-face card-back">
              <div class="word-en" id="cur-word-en-back"></div>
              <div class="translation" id="cur-word-vi"></div>
            </div>
          </div>
        </div>
        <!-- slot next -->
        <div class="card-slot" id="slot-next">
          <div class="card" id="card-next">
            <div class="card-face card-front"><div class="word" id="next-word-en"></div></div>
            <div class="card-face card-back">
              <div class="word-en" id="next-word-en-back"></div>
              <div class="translation" id="next-word-vi"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="audio-status"></div>
  </div>

  <div id="nav-bar">
    <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">‹</button>
    <button id="flip-btn" onclick="flipCard()">Lật thẻ</button>
    <button class="nav-btn" id="next-btn" onclick="navigate(1)">›</button>
  </div>
</div>

<script>
let DATA          = [];
let curSection    = 0;
let curIndex      = 0;
let isFlipped     = false;
let isAnimating   = false;
let currentAudio  = null;

// ── Drawer ────────────────────────────────────────────────────────────────────
function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('drawer-overlay').classList.toggle('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('h.json');
    if (!res.ok) throw new Error();
    DATA = await res.json();
    buildDrawerMenu();
    fillSlots();
    renderMeta();
    setTimeout(playAudio, 700);
  } catch {
    document.getElementById('app').innerHTML =
      `<div style="text-align:center;padding:60px;color:#f87171;">
        <div style="font-size:2rem;margin-bottom:12px">⚠️</div>
        <div style="font-weight:600">Không tìm thấy h.json</div>
        <div style="font-size:0.8rem;color:#555;margin-top:8px">Đặt h.json cùng thư mục HTML</div>
      </div>`;
  }
}
init();

function buildDrawerMenu() {
  const menu = document.getElementById('drawer-menu');
  menu.innerHTML = '';
  DATA.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'drawer-tab' + (i === 0 ? ' active' : '');
    btn.textContent = sec.title;
    btn.onclick = () => { curSection = i; curIndex = 0; closeDrawer(); resetTrack(); fillSlots(); renderMeta(); setTimeout(playAudio,400); document.querySelectorAll('.drawer-tab').forEach((t,j)=>t.classList.toggle('active',j===i)); };
    menu.appendChild(btn);
  });
}

// ── Slots ─────────────────────────────────────────────────────────────────────
function word(offset) {
  const sec = DATA[curSection];
  const idx = curIndex + offset;
  return (idx >= 0 && idx < sec.words.length) ? sec.words[idx] : null;
}

function fillSlots() {
  const prev = word(-1), cur = word(0), next = word(1);
  setSlot('prev', prev);
  setSlot('cur',  cur);
  setSlot('next', next);
  document.getElementById('card-cur').classList.remove('flipped');
  isFlipped = false;
}

function setSlot(name, w) {
  const en  = document.getElementById(`${name}-word-en`);
  const enb = document.getElementById(`${name}-word-en-back`);
  const vi  = document.getElementById(`${name}-word-vi`);
  if (en)  en.textContent  = w ? w.e : '';
  if (enb) enb.textContent = w ? w.e : '';
  if (vi)  vi.textContent  = w ? w.v : '';
}

function renderMeta() {
  const sec = DATA[curSection];
  document.getElementById('section-title').textContent = sec.title;
  document.getElementById('counter').textContent       = `${curIndex + 1} / ${sec.words.length}`;
  document.getElementById('prev-btn').disabled         = curIndex === 0;
  document.getElementById('next-btn').disabled         = curIndex === sec.words.length - 1;
  document.getElementById('progress-bar').style.width  = ((curIndex + 1) / sec.words.length * 100) + '%';
  document.getElementById('audio-status').textContent  = '';
}

function resetTrack() {
  const track = document.getElementById('card-track');
  track.classList.remove('animating');
  track.style.transform = '';
}

// ── Navigate ──────────────────────────────────────────────────────────────────
function navigate(dir) {
  if (isAnimating) return;
  const next = curIndex + dir;
  const len  = DATA[curSection].words.length;
  if (next < 0 || next >= len) return;

  isAnimating = true;
  const track  = document.getElementById('card-track');
  const movePct = dir === 1 ? -33.333 : 33.333;

  track.classList.add('animating');
  track.style.transform = `translateX(${movePct}%)`;

  track.addEventListener('transitionend', function h() {
    track.removeEventListener('transitionend', h);
    track.classList.remove('animating');
    track.style.transform = '';
    curIndex    = next;
    isAnimating = false;
    fillSlots();
    renderMeta();
    setTimeout(playAudio, 200);
  });
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card-cur').classList.toggle('flipped', isFlipped);
}
document.getElementById('card-cur').addEventListener('click', flipCard);

// ── Touch swipe ───────────────────────────────────────────────────────────────
let tx0 = 0, ty0 = 0, dragging = false, dragDx = 0;
const vp = document.getElementById('card-viewport');
const track = document.getElementById('card-track');

vp.addEventListener('touchstart', e => {
  if (isAnimating) return;
  tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY; dragging = false; dragDx = 0;
}, { passive: true });

vp.addEventListener('touchmove', e => {
  if (isAnimating) return;
  const dx = e.touches[0].clientX - tx0;
  const dy = e.touches[0].clientY - ty0;
  if (!dragging && Math.abs(dx) < 8) return;
  if (!dragging && Math.abs(dy) > Math.abs(dx)) return;
  dragging = true; dragDx = dx;
  // Move track: 1px finger → track moves proportionally (viewport width = 33.333% of track)
  const vpW = vp.offsetWidth;
  const pct  = (dx / vpW) * 33.333;
  track.style.transform = `translateX(${pct}%)`;
}, { passive: true });

vp.addEventListener('touchend', () => {
  if (!dragging) return;
  dragging = false;
  const dx  = dragDx;
  const len = DATA[curSection].words.length;
  const vpW = vp.offsetWidth;
  const threshold = vpW * 0.25;

  if (dx < -threshold && curIndex + 1 < len) {
    navigate(1);
  } else if (dx > threshold && curIndex > 0) {
    navigate(-1);
  } else {
    // Snap back
    track.classList.add('animating');
    track.style.transform = '';
    track.addEventListener('transitionend', function h() {
      track.removeEventListener('transitionend', h);
      track.classList.remove('animating');
    });
  }
  dragDx = 0;
}, { passive: true });

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!DATA.length) return;
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === ' ')          { e.preventDefault(); flipCard(); }
  if (e.key.toLowerCase() === 's') playAudio();
});

// ── Audio — iPhone Web Speech (en-US) ────────────────────────────────────────
function playAudio() {
  if (!DATA.length) return;
  const w   = word(0); if (!w) return;
  const txt = w.e.trim();
  const btn = document.getElementById('sound-btn');

  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();

  btn.textContent = '⏳';

  const utt   = new SpeechSynthesisUtterance(txt);
  utt.lang    = 'en-US';
  utt.rate    = 0.85;
  utt.pitch   = 1;
  utt.volume  = 1;

  // Chọn giọng tốt nhất — iPhone có "Samantha" hoặc "Karen"
  function speak() {
    const voices   = speechSynthesis.getVoices();
    const priority = ['Samantha','Karen','Moira','Google US English','Microsoft Aria','Microsoft Guy'];
    let best = null;
    for (const name of priority) { best = voices.find(v => v.name.includes(name)); if (best) break; }
    if (!best) best = voices.find(v => v.lang === 'en-US' && !v.name.includes('compact'));
    if (!best) best = voices.find(v => v.lang.startsWith('en'));
    if (best) utt.voice = best;
    utt.onstart = () => { btn.textContent = '🔊'; };
    utt.onend   = () => { btn.textContent = '🔊'; };
    utt.onerror = () => { btn.textContent = '🔊'; };
    speechSynthesis.speak(utt);
  }

  // iOS cần voices load xong mới speak được
  if (speechSynthesis.getVoices().length > 0) {
    speak();
  } else {
    speechSynthesis.onvoiceschanged = () => { speak(); };
  }
}

if (window.speechSynthesis) speechSynthesis.getVoices();
</script>
</body>
</html>
