
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Từ Vựng</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #161920; --card: #1c2030;
    --border: #252a38; --accent: #4f8ef7; --accent2: #7c5af0;
    --text: #e8eaf0; --muted: #6b7280; --success: #34d399; --radius: 18px;
  }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }

  /* Header */
  header { padding: 18px 24px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 12px; }
  header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; background: linear-gradient(120deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }



  /* App */
  #app { flex: 1; display: flex; flex-direction: column; display: none; }

  /* Menu */
  #menu-wrap { background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  #menu-wrap::-webkit-scrollbar { display: none; }
  #menu { display: flex; padding: 0 20px; gap: 4px; white-space: nowrap; }
  .tab { padding: 10px 16px; font-size: 0.78rem; font-weight: 500; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: color .2s, border-color .2s; font-family: 'Inter', sans-serif; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Main */
  main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 32px 20px 40px; gap: 24px; }
  #section-title { font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 600; color: var(--muted); text-align: center; }
  #counter { font-size: 0.78rem; color: var(--muted); font-weight: 500; letter-spacing: 0.06em; }

  /* Progress */
  #progress-wrap { width: 100%; max-width: 420px; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
  #progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .4s ease; }

  /* Card */
  #card-area { perspective: 1200px; width: 100%; max-width: 420px; height: 240px; }
  #card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .5s cubic-bezier(.4,0,.2,1); cursor: pointer; }
  #card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 28px; }
  .card-face::before { content: ''; position: absolute; inset: 0; border-radius: var(--radius); background: radial-gradient(ellipse at 30% 20%, rgba(79,142,247,.06) 0%, transparent 60%); pointer-events: none; }
  .card-front .word { font-family: 'Space Grotesk', sans-serif; font-size: 2.2rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; text-align: center; }
  .card-front .hint { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .card-back { transform: rotateY(180deg); background: #1a1f32; }
  .card-back .translation { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 600; color: var(--success); text-align: center; }
  .card-back .word-en { font-size: 0.88rem; color: var(--muted); text-align: center; }

  /* Sound button */
  #sound-btn { position: absolute; top: 14px; right: 14px; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: rgba(79,142,247,.08); color: var(--accent); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; transition: background .2s, transform .15s; z-index: 10; }
  #sound-btn:hover { background: rgba(79,142,247,.18); transform: scale(1.08); }
  #sound-btn.playing { background: rgba(79,142,247,.25); }
  #sound-btn.error { color: #f87171; border-color: #f87171; }

  #audio-status { font-size: 0.7rem; color: var(--muted); height: 16px; }

  /* Nav */
  #nav { display: flex; align-items: center; gap: 16px; }
  .nav-btn { width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s, transform .15s, border-color .2s; }
  .nav-btn:hover { background: var(--card); border-color: var(--accent); transform: scale(1.05); }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }
  #flip-btn { padding: 12px 28px; border-radius: 99px; border: 1px solid var(--accent); background: rgba(79,142,247,.1); color: var(--accent); font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: background .2s; }
  #flip-btn:hover { background: rgba(79,142,247,.2); }



  @media (max-width: 480px) {
    #card-area { height: 210px; }
    .card-front .word { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<header>
  <span style="font-size:1.3rem">🃏</span>
  <h1>Flashcard Từ Vựng</h1>
</header>


<!-- App -->
<div id="app" style="flex:1;display:flex;flex-direction:column;">
  <div id="menu-wrap"><div id="menu"></div></div>
  <main>
    <div id="section-title"></div>
    <div id="counter"></div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>

    <div id="card-area">
      <div id="card">
        <div class="card-face card-front">
          <button id="sound-btn" title="Nghe phát âm" onclick="event.stopPropagation(); playAudio()">🔊</button>
          <div class="word" id="word-en"></div>
          <div class="hint">nhấn để xem nghĩa</div>
        </div>
        <div class="card-face card-back">
          <div class="word-en" id="word-en-back"></div>
          <div class="translation" id="word-vi"></div>
        </div>
      </div>
    </div>

    <div id="audio-status"></div>

    <div id="nav">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">‹</button>
      <button id="flip-btn" onclick="flipCard()">Lật thẻ</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">›</button>
    </div>
  </main>
</div>

<script>
let DATA = [];
let currentSection = 0;
let currentIndex   = 0;
let isFlipped      = false;
let audioCache     = {};

// ── Load h.json ──────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('h.json');
    if (!res.ok) throw new Error();
    DATA = await res.json();
    buildMenu();
    render();
  } catch {
    document.getElementById('app').innerHTML =
      `<div style="text-align:center;padding:60px;color:#f87171;">
        <div style="font-size:2rem;margin-bottom:12px">⚠️</div>
        <div style="font-weight:600">Không tìm thấy file h.json</div>
        <div style="font-size:0.8rem;color:#6b7280;margin-top:8px">Đặt h.json cùng thư mục với file HTML</div>
      </div>`;
  }
}

init();

function buildMenu() {
  const menu = document.getElementById('menu');
  menu.innerHTML = '';
  DATA.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = sec.title;
    btn.onclick = () => switchSection(i);
    menu.appendChild(btn);
  });
}

// ── App logic ────────────────────────────────────────────────────────────────
function switchSection(i) {
  currentSection = i;
  currentIndex   = 0;
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', j === i));
  render();
}

function render() {
  const sec  = DATA[currentSection];
  const word = sec.words[currentIndex];
  isFlipped  = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('section-title').textContent = sec.title;
  document.getElementById('word-en').textContent       = word.e;
  document.getElementById('word-en-back').textContent  = word.e;
  document.getElementById('word-vi').textContent       = word.v;
  document.getElementById('counter').textContent       = `${currentIndex + 1} / ${sec.words.length}`;
  document.getElementById('prev-btn').disabled         = currentIndex === 0;
  document.getElementById('next-btn').disabled         = currentIndex === sec.words.length - 1;
  document.getElementById('progress-bar').style.width  = ((currentIndex + 1) / sec.words.length * 100) + '%';
  resetSoundBtn();
  setStatus('');
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}
document.getElementById('card').addEventListener('click', flipCard);

function navigate(dir) {
  const next = currentIndex + dir;
  const len  = DATA[currentSection].words.length;
  if (next < 0 || next >= len) return;
  currentIndex = next;
  render();
}

document.addEventListener('keydown', e => {
  if (!DATA.length) return;
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === ' ')          { e.preventDefault(); flipCard(); }
  if (e.key === 's' || e.key === 'S') playAudio();
});

// ── Audio ────────────────────────────────────────────────────────────────────
function resetSoundBtn() {
  const btn = document.getElementById('sound-btn');
  btn.classList.remove('playing', 'error');
  btn.textContent = '🔊';
}
function setStatus(msg) { document.getElementById('audio-status').textContent = msg; }

async function playAudio() {
  const word = DATA[currentSection].words[currentIndex].e;
  const btn  = document.getElementById('sound-btn');
  btn.classList.remove('error');
  btn.classList.add('playing');
  btn.textContent = '⏳';
  try {
    if (audioCache[word]) {
      await playUrl(audioCache[word]);
      btn.classList.remove('playing'); btn.textContent = '🔊';
      return;
    }
    const res  = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    let audioUrl = null;
    outer:
    for (const entry of data)
      for (const p of (entry.phonetics || []))
        if (p.audio) { audioUrl = p.audio; break outer; }
    if (!audioUrl) throw new Error('no audio');
    if (audioUrl.startsWith('//')) audioUrl = 'https:' + audioUrl;
    audioCache[word] = audioUrl;
    await playUrl(audioUrl);
    setStatus('');
    btn.classList.remove('playing'); btn.textContent = '🔊';
  } catch {
    setStatus('Không có audio thật, dùng giọng đọc máy');
    btn.classList.remove('playing'); btn.classList.add('error'); btn.textContent = '🔈';
    speechFallback(word);
  }
}

function playUrl(url) {
  return new Promise((resolve, reject) => {
    const a = new Audio(url);
    a.onended = resolve; a.onerror = reject;
    a.play().catch(reject);
  });
}

function speechFallback(word) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang  = 'en-US'; utt.rate = 0.9;
  const v = speechSynthesis.getVoices().find(v => v.lang.startsWith('en'));
  if (v) utt.voice = v;
  utt.onend = () => setStatus('');
  speechSynthesis.speak(utt);
}
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}
</script>
</body>
</html>
