<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Flashcards</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .progress {
            font-size: 14px;
            color: #757575;
            margin-bottom: 25px;
        }

        /* Hiệu ứng lật thẻ 3D */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 250px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .card-front {
            background-color: #1e1e1e;
            border: 2px solid #00adb5;
        }

        .card-front .word {
            color: #00adb5;
            font-size: 32px;
            font-weight: 700;
        }

        .card-front .hint, .card-back .hint {
            font-size: 12px;
            color: #616161;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-back {
            background-color: #252525;
            border: 2px solid #393e46;
            transform: rotateY(180deg);
        }

        .card-back .word {
            color: #eeeeee;
            font-size: 28px;
            font-weight: 600;
        }

        /* Nút điều khiển */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        button {
            background-color: #2a2a2a;
            color: #eeeeee;
            border: 1px solid #3a3a3a;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover:not(:disabled) {
            background-color: #333333;
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        button.audio-btn {
            background-color: #00adb5;
            color: #121212;
            border: none;
            font-weight: 600;
            flex: 1.2;
        }

        button.audio-btn:hover {
            background-color: #00cfd8;
        }

        .icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Flashcards Từ Vựng</h1>
        <div class="progress" id="progress">Đang tải...</div>

        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="flashcard">
                <div class="card-face card-front">
                    <div class="word" id="en-word">-</div>
                    <div class="hint">Nhấn để xem nghĩa</div>
                </div>
                <div class="card-face card-back">
                    <div class="word" id="vi-word">-</div>
                    <div class="hint">Nhấn để quay lại</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="prev-btn" onclick="prevWord(event)" disabled>
                <svg class="icon" viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg> Trước
            </button>
            
            <button class="audio-btn" id="audio-btn" onclick="playAudio(event)">
                <svg class="icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg> Phát âm
            </button>
            
            <button id="next-btn" onclick="nextWord(event)" disabled>
                Sau <svg class="icon" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>
    </div>

    <script>
        // Dữ liệu dự phòng nếu file h.json không tải được (VD: lỗi máy chủ/CORS)
        let dataset = [
            {"e": "company", "v": "công ty"},
            {"e": "technology", "v": "công nghệ"}
        ];
        
        let currentIndex = 0;
        const flashcard = document.getElementById('flashcard');
        const enWord = document.getElementById('en-word');
        const viWord = document.getElementById('vi-word');
        const progress = document.getElementById('progress');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        // Tải từ vựng từ file h.json
        async function loadVocabulary() {
            try {
                const response = await fetch('h.json');
                if (response.ok) {
                    dataset = await response.json();
                } else {
                    console.warn("Không tìm thấy h.json. Đang dùng dữ liệu mặc định.");
                }
            } catch (error) {
                console.warn("Lỗi tải h.json (có thể do mở file trực tiếp bị chặn CORS). Đang dùng dữ liệu mặc định.");
            }
            renderWord();
        }

        // Render dữ liệu lên thẻ
        function renderWord() {
            if (!dataset || dataset.length === 0) return;

            const isFlipped = flashcard.classList.contains('flipped');
            
            // Chờ hiệu ứng mặt thẻ quay về trước rồi mới đổi chữ
            if (isFlipped) {
                flashcard.classList.remove('flipped');
                setTimeout(updateTextAndButtons, 250);
            } else {
                updateTextAndButtons();
            }
        }

        function updateTextAndButtons() {
            enWord.textContent = dataset[currentIndex].e;
            viWord.textContent = dataset[currentIndex].v;
            progress.textContent = `Từ ${currentIndex + 1} / ${dataset.length}`;

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === dataset.length - 1;
        }

        function flipCard() {
            flashcard.classList.toggle('flipped');
        }

        function prevWord(event) {
            event.stopPropagation(); // Không lật thẻ khi bấm nút
            if (currentIndex > 0) {
                currentIndex--;
                renderWord();
            }
        }

        function nextWord(event) {
            event.stopPropagation();
            if (currentIndex < dataset.length - 1) {
                currentIndex++;
                renderWord();
            }
        }

        // Chạy âm thanh từ Google Dịch
        function playAudio(event) {
            event.stopPropagation();
            if (!dataset || dataset.length === 0) return;

            const text = dataset[currentIndex].e;
            const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=${encodeURIComponent(text)}`;
            
            const audio = new Audio(ttsUrl);
            audio.play().catch(error => {
                alert("Hãy chắc chắn bạn có kết nối Internet để phát âm thanh.");
            });
        }

        window.onload = loadVocabulary;
    </script>
</body>
</html>
